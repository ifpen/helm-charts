name: RC Release on PR to main

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

jobs:
  rc-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      pull-requests: write
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm chart
        run: helm lint charts/filesender

      - name: Template Helm chart
        run: helm template charts/filesender

      - name: Determine RC version and detect Docker changes
        id: rc-version
        run: |
          CHART_VERSION=$(grep '^version:' charts/filesender/Chart.yaml | awk '{print $2}')
          echo "chart_version=${CHART_VERSION}" >> "$GITHUB_OUTPUT"

          COMMITS_AHEAD=$(git rev-list --count origin/main..HEAD)

          RC_VERSION="${CHART_VERSION}-rc.${COMMITS_AHEAD}"
          echo "rc_version=${RC_VERSION}" >> "$GITHUB_OUTPUT"
          echo "📦 Version RC: ${RC_VERSION}"

          # Detect if docker/filesender files changed compared to main
          if git diff --name-only origin/main...HEAD -- docker/filesender/ | grep -q .; then
            echo "docker_changed=true" >> "$GITHUB_OUTPUT"
            echo "🐳 Changements Docker détectés"

            # Extract Docker image metadata from Dockerfile
            FS_VERSION=$(grep 'ARG FILESENDER_VERSION=' docker/filesender/Dockerfile | head -n 1 | cut -d'=' -f2 | tr -d '"' | tr -d ' ')
            PHP_IMAGE=$(grep '^FROM php:' docker/filesender/Dockerfile | head -n 1 | awk '{print $2}')
            PHP_VERSION=$(echo "$PHP_IMAGE" | cut -d':' -f2 | cut -d'-' -f1)

            if [[ -z "$FS_VERSION" || -z "$PHP_VERSION" ]]; then
              echo "::error::Impossible d'extraire les versions depuis le Dockerfile"
              exit 1
            fi

            BASE_TAG="${FS_VERSION}-php${PHP_VERSION}"
            RC_IMAGE_TAG="${BASE_TAG}-rc.${COMMITS_AHEAD}"
            RC_IMAGE="ghcr.io/${{ github.repository_owner }}/filesender:${RC_IMAGE_TAG}"
            echo "rc_image_tag=${RC_IMAGE_TAG}" >> "$GITHUB_OUTPUT"
            echo "rc_image=${RC_IMAGE}" >> "$GITHUB_OUTPUT"
            echo "🐳 Image Docker RC: ${RC_IMAGE}"
          else
            echo "docker_changed=false" >> "$GITHUB_OUTPUT"
            echo "rc_image_tag=" >> "$GITHUB_OUTPUT"
            echo "rc_image=" >> "$GITHUB_OUTPUT"
            echo "🐳 Pas de changements Docker"
          fi

      - name: Login to GitHub Container Registry
        if: steps.rc-version.outputs.docker_changed == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker RC image
        if: steps.rc-version.outputs.docker_changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./docker/filesender
          push: true
          tags: ${{ steps.rc-version.outputs.rc_image }}

      - name: Build RC Helm package
        run: |
          RC_VERSION="${{ steps.rc-version.outputs.rc_version }}"

          cp -r charts/filesender /tmp/filesender-rc
          sed -i "s/^version: .*/version: ${RC_VERSION}/" /tmp/filesender-rc/Chart.yaml

          # If a Docker RC image was built, update values.yaml to use it
          if [[ "${{ steps.rc-version.outputs.docker_changed }}" == "true" ]]; then
            RC_IMAGE_TAG="${{ steps.rc-version.outputs.rc_image_tag }}"
            # Replace the first occurrence of '  tag:' in values.yaml (image.tag)
            sed -i '0,/^  tag: .*/{s/^  tag: .*/  tag: "'"${RC_IMAGE_TAG}"'"/}' /tmp/filesender-rc/values.yaml
            echo "🐳 values.yaml mis à jour avec l'image RC: ${RC_IMAGE_TAG}"
          fi

          helm package /tmp/filesender-rc -d /tmp/helm-packages/
          echo "📦 Package créé : filesender-${RC_VERSION}.tgz"

      - name: Generate RC changelog
        id: changelog
        run: |
          RC_VERSION="${{ steps.rc-version.outputs.rc_version }}"

          # Find the previous RC tag for changelog comparison (exclude current RC version)
          PREV_RC_TAG=$(git for-each-ref --sort=-creatordate --format='%(refname:short)' refs/tags \
            | grep '^filesender-.*-rc\.' | grep -v "filesender-${RC_VERSION}$" | head -1)

          if [ -n "$PREV_RC_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" "${PREV_RC_TAG}..HEAD")
            COMPARE_REF="$PREV_RC_TAG"
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" "origin/main..HEAD")
            COMPARE_REF="main"
          fi

          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="- No changes"
          fi

          # Write notes to a temp file for multi-line support
          NOTES_FILE=$(mktemp)
          {
            echo "## 📦 RC \`${RC_VERSION}\` from PR #${{ github.event.pull_request.number }}"
            echo ""
            echo "### Changes since \`${COMPARE_REF}\`"
            echo ""
            echo "$CHANGELOG"
          } > "$NOTES_FILE"

          echo "notes_file=${NOTES_FILE}" >> "$GITHUB_OUTPUT"

      - name: Create RC GitHub pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RC_VERSION="${{ steps.rc-version.outputs.rc_version }}"
          TAG="filesender-${RC_VERSION}"
          TGZ_FILE="/tmp/helm-packages/filesender-${RC_VERSION}.tgz"

          # Delete existing release with same tag if re-running
          gh release delete "${TAG}" --yes --cleanup-tag 2>/dev/null || true
          git push --delete origin "${TAG}" 2>/dev/null || true
          git tag -d "${TAG}" 2>/dev/null || true

          # Create a tag at the PR head commit
          git tag "${TAG}"
          git push origin "${TAG}"

          # Create pre-release with chart package as asset and changelog
          gh release create "${TAG}" "${TGZ_FILE}" \
            --prerelease \
            --title "filesender-${RC_VERSION}" \
            --notes-file "${{ steps.changelog.outputs.notes_file }}"

      - name: Clean up old RC pre-releases (keep last 3)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # List all RC pre-releases sorted by creation date (newest first), skip the 3 most recent
          gh release list --limit 100 --json tagName,isPrerelease,createdAt \
            --jq '[.[] | select(.isPrerelease) | select(.tagName | test("-rc\\."))] | sort_by(.createdAt) | reverse | .[3:] | .[].tagName' \
            | while read -r tag; do
                echo "Deleting old RC release: ${tag}"
                gh release delete "${tag}" --yes --cleanup-tag
              done

      - name: Update Helm repo index on gh-pages
        run: |
          RC_VERSION="${{ steps.rc-version.outputs.rc_version }}"
          TAG="filesender-${RC_VERSION}"

          git clone --branch gh-pages --single-branch \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            /tmp/gh-pages

          # Generate index entry with release asset URL and merge with existing index
          mkdir -p /tmp/rc-index
          cp /tmp/helm-packages/filesender-${RC_VERSION}.tgz /tmp/rc-index/

          cd /tmp/gh-pages
          if [ -f index.yaml ]; then
            helm repo index /tmp/rc-index \
              --url "https://github.com/${{ github.repository }}/releases/download/${TAG}" \
              --merge index.yaml
          else
            helm repo index /tmp/rc-index \
              --url "https://github.com/${{ github.repository }}/releases/download/${TAG}"
          fi
          mv /tmp/rc-index/index.yaml index.yaml

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.yaml
          git commit -m "chore: publish RC ${RC_VERSION} from PR #${{ github.event.pull_request.number }}"
          git push

      - name: Comment PR with RC info
        uses: actions/github-script@v7
        with:
          script: |
            const rcVersion = '${{ steps.rc-version.outputs.rc_version }}';
            const chartVersion = '${{ steps.rc-version.outputs.chart_version }}';
            const dockerChanged = '${{ steps.rc-version.outputs.docker_changed }}' === 'true';
            const rcImage = '${{ steps.rc-version.outputs.rc_image }}';

            let dockerSection = '';
            if (dockerChanged) {
              dockerSection = `
            ### 🐳 Image Docker RC
            | | |
            |---|---|
            | **Image RC** | \`${rcImage}\` |

            \`\`\`bash
            docker pull ${rcImage}
            \`\`\`

            `;
            }

            const body = `## 🏷️ Version RC publiée

            | | |
            |---|---|
            | **Chart RC** | \`${rcVersion}\` |
            | **Version finale prévue** | \`${chartVersion}\` |
            | **FileSender** | \`${chartVersion.split('.').slice(0,2).join('.')}\` |
            ${dockerChanged ? `| **Image Docker RC** | \`${rcImage}\` |` : ''}

            ### Installation pour test
            \`\`\`bash
            helm repo update ifpen
            helm install filesender-rc ifpen/filesender --version ${rcVersion}
            \`\`\`
            ${dockerSection}
            ### Vérification
            \`\`\`bash
            helm search repo ifpen/filesender --versions --devel
            \`\`\`

            > ⚠️ Cette version RC sera remplacée par la version stable \`${chartVersion}\` lors du merge.
            `;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Version RC publiée')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
