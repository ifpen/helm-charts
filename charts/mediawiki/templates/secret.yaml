apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mediawiki.fullname" . }}
  labels:
    {{- include "mediawiki.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- $secretObj := (lookup "v1" "Secret" .Release.Namespace (include "mediawiki.fullname" .)) | default dict }}
  {{- $secretData := (get $secretObj "data") | default dict }}

  # Clé secrète MediaWiki pour les sessions
  mediawiki-secret-key: {{ .Values.mediawiki.secretKey | default (get $secretData "mediawiki-secret-key" | b64dec) | default (randAlphaNum 64) | quote }}

  # Clé de mise à jour MediaWiki
  mediawiki-upgrade-key: {{ .Values.mediawiki.upgradeKey | default (get $secretData "mediawiki-upgrade-key" | b64dec) | default (randAlphaNum 16) | quote }}

  # Mot de passe de l'administrateur MediaWiki
  mediawiki-admin-password: {{ .Values.mediawiki.adminPassword | default (get $secretData "mediawiki-admin-password" | b64dec) | default (randAlphaNum 16) | quote }}

  {{- if .Values.mariadb.internal.enabled }}
  # Mot de passe root MariaDB
  mariadb-root-password: {{ .Values.mariadb.internal.rootPassword | default (get $secretData "mariadb-root-password" | b64dec) | default (randAlphaNum 32) | quote }}

  # Mot de passe utilisateur MariaDB
  mariadb-password: {{ .Values.mariadb.internal.password | default (get $secretData "mariadb-password" | b64dec) | default (randAlphaNum 32) | quote }}
  {{- end }}

  {{- if and .Values.mariadb.external.enabled (not .Values.mariadb.external.existingSecret) }}
  # Mot de passe base de données externe
  mariadb-external-password: {{ .Values.mariadb.external.password | quote }}
  {{- end }}
