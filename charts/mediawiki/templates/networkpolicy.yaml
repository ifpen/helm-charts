{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "mediawiki.fullname" . }}
  labels:
    {{- include "mediawiki.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "mediawiki.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: mediawiki
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: 80
          protocol: TCP
  egress:
    {{- if .Values.mariadb.internal.enabled }}
    - to:
        - podSelector:
            matchLabels:
              {{- include "mediawiki.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: mariadb
      ports:
        - port: 3306
          protocol: TCP
    {{- else if .Values.mariadb.external.enabled }}
    - ports:
        - port: {{ .Values.mariadb.external.port | default 3306 }}
          protocol: TCP
    {{- end }}
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
{{- end }}
